<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเมนูนำทางระดับองค์กร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .swiper-pagination-bullet-active { background-color: #3b82f6 !important; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* เพิ่มโค้ดนี้ต่อท้ายในแท็ก <style> เดิม */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            /* ปรับตัวเลข 20s ให้มาก/น้อย เพื่อลด/เพิ่มความเร็วได้ครับ */
            animation: marquee 20s linear infinite; 
        }
        .animate-marquee:hover {
            animation-play-state: paused; /* หยุดวิ่งเมื่อเอาเมาส์ชี้ */
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="pb-20">

    <header class="glass-effect sticky top-0 z-50 shadow-sm px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-blue-800">AppPortal</h1>
        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </header>

    <div class="swiper mySwiper w-full h-48 md:h-72 bg-gray-200">
        <div class="swiper-wrapper" id="banner-container">
            <div class="swiper-slide flex items-center justify-center text-gray-400">กำลังโหลดแบนเนอร์...</div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

<div class="bg-blue-600 text-white px-4 py-2 flex items-center text-sm shadow-md overflow-hidden relative">
        <div class="font-bold mr-3 whitespace-nowrap bg-red-500 px-2 py-1 rounded text-xs z-10 shadow">ประกาศ</div>
        
        <div class="flex-1 overflow-hidden">
            <div id="news-container" class="animate-marquee font-light">
                กำลังโหลดข่าวสาร...
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide" id="filter-container">
            <button onclick="filterMenu('all')" class="filter-btn active bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm">ทั้งหมด</button>
            <button onclick="filterMenu('HR')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm">บุคคล (HR)</button>
            <button onclick="filterMenu('IT')" class="filter-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm">ไอที (IT)</button>
        </div>

        <div class="grid grid-cols-4 md:grid-cols-6 gap-4 mt-6" id="menu-container">
            <div class="col-span-full text-center text-gray-500 py-10">กำลังโหลดเมนู...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // นำ Web App URL ของคุณมาใส่ที่นี่
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwuSq1N-wimWk7zyCvUNdZYGkW-_fHz4nke536Tn1nabuZJhOh_qgin2smw1fw7lXMc/exec?action=getData';
        let allMenus = [];

        async function fetchData() {
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                
                renderBanners(data.banners);
                renderNews(data.news);
                allMenus = data.menus;
                renderMenus(allMenus);
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('menu-container').innerHTML = '<div class="col-span-full text-center text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }

        function renderBanners(banners) {
            const container = document.getElementById('banner-container');
            container.innerHTML = banners.map(b => `
                <div class="swiper-slide cursor-pointer" onclick="window.open('${b.link_url}', '_blank')">
                    <img src="${b.image_url}" class="w-full h-full object-cover" alt="Banner">
                </div>
            `).join('');
            
            new Swiper(".mySwiper", {
                loop: true,
                autoplay: { delay: 3500, disableOnInteraction: false },
                pagination: { el: ".swiper-pagination", dynamicBullets: true },
            });
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            container.innerHTML = news.map(n => `📢 ${n.title} (${n.date})`).join(' &nbsp;&nbsp;|&nbsp;&nbsp; ');
        }

        function renderMenus(menus) {
            const container = document.getElementById('menu-container');
            container.innerHTML = menus.map(m => `
                <a href="${m.link_url}" target="_blank" class="flex flex-col items-center group transition-transform transform hover:scale-105">
                    <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-2 text-3xl group-hover:shadow-md border border-gray-100">
                        ${m.icon_url} </div>
                    <span class="text-xs text-center text-gray-700 font-medium leading-tight">${m.title}</span>
                </a>
            `).join('');
        }

        function filterMenu(dept) {
            // จัดการ Style ของปุ่ม
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-600');
            });
            event.currentTarget.classList.remove('bg-white', 'text-gray-600');
            event.currentTarget.classList.add('bg-blue-600', 'text-white');

            // กรองข้อมูล
            const filtered = dept === 'all' ? allMenus : allMenus.filter(m => m.department === dept);
            renderMenus(filtered);
        }

        // เริ่มต้นโหลดข้อมูล
        fetchData();
    </script>
</body>
</html>
